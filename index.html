<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="#" class="brand">Weather App</a>

        <nav class="nav-links" aria-label="Primary navigation">
          <a href="#" class="active">Dashboard</a>
          <a href="#">Map</a>
          <a href="#">Education</a>
          <a href="#">Historical</a>
        </nav>

        <button class="theme-toggle" type="button" aria-label="Toggle theme">
          <span id="themeIcon">☀</span>
        </button>
      </div>
    </header>

    <main class="app-shell">
      <section class="search-section">
        <form class="search-form" id="searchForm">
          <label class="sr-only" for="cityInput">Search city</label>
          <input
            id="cityInput"
            class="search-input"
            type="search"
            placeholder="Search for a city..."
            autocomplete="off"
            required
          />
          <button class="search-button" id="searchButton" type="submit">Search</button>
        </form>
        <p class="status-message is-hidden" id="statusMessage" aria-live="polite"></p>
      </section>

      <section class="weather-card is-empty" id="weatherCard">
        <p class="empty-card-message">Search for a city to view current weather.</p>
      </section>

      <section class="forecast-strip" id="forecastStrip">
        <article class="forecast-card active">Forecast will appear here</article>
      </section>
      
      <section class="insights-panel placeholder" id="insightsPanel">
        Hourly micro-data insights will appear here
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <strong>Weather App</strong>
        <p>© 2024 Weather App. Precision Weather Education.</p>

        <nav class="footer-links" aria-label="Footer links">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
          <a href="#">Scientific Data Sources</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
